name: Update dashboard data

on:
  schedule:
    - cron: "*/5 * * * *"   # every ~5 minutes
  workflow_dispatch: {}       # gives you an "update now" button on GitHub

permissions:
  contents: write             # allow the bot to commit fresh data

concurrency:                  # never run two updates at once
  group: update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Fetch latest data
        env:
          SPORT5_EMAIL: ${{ secrets.SPORT5_EMAIL }}
          SPORT5_PASSWORD: ${{ secrets.SPORT5_PASSWORD }}
          # manual "Run workflow" forces a full pull; scheduled runs stay smart (skip when idle)
          FORCE: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: node fetch-data.mjs
      - name: Commit if data changed
        run: |
          git config user.name "wc2026-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/dashboard.json
          git diff --staged --quiet || git commit -m "data: auto-update $(date -u +%FT%TZ)"
          git push
