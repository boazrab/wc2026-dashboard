name: Update dashboard data

on:
  schedule:
    - cron: "*/10 * * * *"   # backup: restarts the self-loop if it ever dies
  workflow_dispatch:
    inputs:
      auto:
        description: "internal flag set by the self-loop (leave false for a manual update)"
        default: "false"

permissions:
  contents: write             # commit fresh data
  actions: write              # trigger the next run (self-loop)

concurrency:
  group: update
  cancel-in-progress: true    # keep exactly one loop alive

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest data
        id: fetch
        env:
          SPORT5_EMAIL: ${{ secrets.SPORT5_EMAIL }}
          SPORT5_PASSWORD: ${{ secrets.SPORT5_PASSWORD }}
          # a human pressing "Run workflow" forces a full pull; the self-loop (auto=true) and the schedule stay smart
          FORCE: ${{ (github.event_name == 'workflow_dispatch' && inputs.auto != 'true') && '1' || '' }}
        run: |
          OUT=$(node fetch-data.mjs); echo "$OUT"
          S=$(echo "$OUT" | grep -oE 'NEXT_SLEEP=[0-9]+' | tail -1 | cut -d= -f2)
          echo "sleep=${S:-900}" >> "$GITHUB_OUTPUT"

      - name: Commit if data changed
        if: always()                      # even if the fetch blipped
        run: |
          git config user.name "wc2026-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/dashboard.json data/status.json
          git diff --staged --quiet && exit 0
          git commit -m "data: auto-update $(date -u +%FT%TZ)"
          for i in 1 2 3; do
            git pull --rebase --autostash && git push && exit 0
            echo "push retry $i…"; sleep 3
          done
          echo "push failed after retries — next cycle will catch up"; exit 0

      - name: Wait, then trigger the next run (self-loop)
        if: always()                      # CRITICAL: keep the loop alive even if a step failed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SLEEP="${{ steps.fetch.outputs.sleep }}"
          echo "next run in ${SLEEP:-300}s"
          sleep "${SLEEP:-300}"
          gh workflow run update.yml --ref main -f auto=true
